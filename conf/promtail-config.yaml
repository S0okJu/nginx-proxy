# Promtail — nginx-proxy 로그 전송 (Loki)
# LOKI_URL, INSTANCE_IP: /opt/nginx-proxy/.env 또는 systemd EnvironmentFile

server:
  http_listen_port: 9080
  grpc_listen_port: 0
  log_level: warn

positions:
  filename: /var/lib/promtail/positions.yaml

clients:
  - url: ${LOKI_URL}/loki/api/v1/push
    backoff_config:
      min_period: 500ms
      max_period: 5m
      max_retries: 10
    batchsize: 1048576
    batchwait: 1s
    timeout: 30s

scrape_configs:
  # nginx access: JSON(metrics_json) — request_id, uri, request_time, status → Loki
  # Grafana: 엔드포인트별 지연( request_time ), 상태코드 분포( status ) 시각화
  # instance_ip: photo-api와 동일 라벨 → 인스턴스별 필터
  - job_name: nginx-proxy-access
    static_configs:
      - targets: [localhost]
        labels:
          job: nginx-proxy
          app: nginx-proxy
          log_type: access
          instance: ${INSTANCE_IP}
          instance_ip: ${INSTANCE_IP}
          __path__: /var/log/nginx/nginx-proxy-access.log
    pipeline_stages:
      - json:
          expressions:
            request_id: request_id
            time: time
            service: service
            method: method
            uri: uri
            request_uri: request_uri
            status: status
            request_time: request_time
            upstream_response_time: upstream_response_time
            remote_addr: remote_addr
      # Loki 라벨 값은 문자열만 허용 — status(숫자)를 문자열로
      - template:
          source: status_str
          template: '{{ .status }}'
      - template:
          source: service_str
          template: '{{ .service }}'
      - labels:
          status: status_str
          service: service_str
      - timestamp:
          source: time
          format: RFC3339

  - job_name: nginx-proxy-error
    static_configs:
      - targets: [localhost]
        labels:
          job: nginx-proxy
          app: nginx-proxy
          log_type: error
          instance: ${INSTANCE_IP}
          instance_ip: ${INSTANCE_IP}
          __path__: /var/log/nginx/nginx-proxy-error.log

  - job_name: journal
    journal:
      json: false
      max_age: 12h
      path: /var/log/journal
      labels:
        job: systemd
        instance: ${INSTANCE_IP}
        instance_ip: ${INSTANCE_IP}
    relabel_configs:
      - source_labels: ['__journal__systemd_unit']
        regex: '(nginx|promtail|node_exporter|nginx-exporter|pushgateway-push)\.service'
        action: keep
      - source_labels: ['__journal__systemd_unit']
        target_label: 'unit'
